# VAF Memory System - Docker Compose
# ====================================
# Containers: postgres (Memory/Auth DB), redis, sandbox, gotenberg, tts, stt.
#
# Start (from project root):
#   docker compose -f docker-compose.memory.yml up -d
#
# Stop:
#   docker compose -f docker-compose.memory.yml down
#
# See: docs/setup/DOCKER_SERVICES.md
#
# Contains:
#   - PostgreSQL 16 + pgvector (vector DB for Memory/RAG + Auth/User DB – do not remove/alter)
#   - Redis 7 (cache for embeddings, sessions)
#   - Python sandbox (safe code execution)
#   - Gotenberg (LibreOffice) – optional, Office→PDF for Document Viewer (document_conversion_docker_url)
#   - TTS (Piper HTTP) – optional, for speech_tts_engine=docker
#   - STT (Whisper HTTP) – optional, for local STT via Docker
#
# IMPORTANT: Postgres volume vaf_pgdata holds Memory and Auth/User data. Do not replace or wipe it.

services:
  # ==========================================================================
  # PostgreSQL + pgvector (Vector Database)
  # ==========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vaf-memory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vaf_memory}
      POSTGRES_USER: ${POSTGRES_USER:-vaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vaf_dev_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vaf_pgdata:/var/lib/postgresql/data
      - ./scripts/init-memory-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vaf} -d ${POSTGRES_DB:-vaf_memory}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vaf-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==========================================================================
  # Redis (Caching Layer)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: vaf-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - vaf_redis:/data
    # Enable persistence with AOF (Append Only File)
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 256mb 
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaf-network
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 64M

  # ==========================================================================
  # Python Sandbox (Persistent, always-ready)
  # Isolated on vaf-sandbox-network — cannot reach postgres/redis/other VAF
  # services by hostname. Only the host gateway (Tool Bridge) and outbound
  # internet (pip install) are reachable.
  # ==========================================================================
  sandbox:
    image: python:3.11-slim
    container_name: vaf-sandbox
    restart: unless-stopped
    command: sleep infinity
    working_dir: /workspace
    volumes:
      - vaf_sandbox:/workspace
    extra_hosts:
      # Makes host.docker.internal resolve to the host machine IP on Linux
      # (Docker Desktop does this automatically on Mac/Windows).
      # Required for the Tool Bridge back-channel (with_vaf_tools=True).
      - "host.docker.internal:host-gateway"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - vaf-sandbox-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 64M

  # ==========================================================================
  # TTS Multi-Language (Piper) – All-in-One container for all languages
  # Supports: de, en, fr, es, it, nl, pl, pt, ru, uk, zh, ja
  # Languages are downloaded on-demand via the /install endpoint
  # Set speech_tts_docker_url to http://localhost:5002
  # ==========================================================================
  tts:
    build:
      context: ./docker/tts-multilang
      dockerfile: Dockerfile
    image: vaf-tts-multilang:latest
    container_name: vaf-tts
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TTS_PORT:-5002}:5000"
    environment:
      TTS_PORT: 5000
      TTS_MODELS_DIR: /app/models
      TTS_DEFAULT_LANG: ${TTS_DEFAULT_LANG:-de}
    volumes:
      - vaf_tts_models:/app/models
      - vaf_tts_config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - vaf-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ==========================================================================
  # Document Conversion (Gotenberg) – LibreOffice-based Office → PDF
  # Converts DOCX, XLSX, PPTX, ODT, ODS, ODP etc. to PDF for native display in Document Viewer.
  # Set document_conversion_docker_url=http://localhost:5005
  # API: POST /forms/libreoffice/convert (multipart: files=@doc.docx)
  # MIT license – compatible with VAF.
  # ==========================================================================
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: vaf-gotenberg
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GOTENBERG_PORT:-5005}:3000"
    command: ["gotenberg", "--api-timeout=60s"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - vaf-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==========================================================================
  # STT (Whisper HTTP) – optional; for local STT via Docker instead of in-process
  # VAF uses POST /asr with multipart file (audio/webm). Set speech_stt_engine=docker and speech_stt_docker_url=http://localhost:5003
  # ==========================================================================
  stt:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: vaf-stt
    restart: unless-stopped
    ports:
      - "127.0.0.1:${STT_PORT:-5003}:9000"
    volumes:
      - vaf_stt_models:/root/.cache/whisper
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health 2>/dev/null || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - vaf-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ==========================================================================
  # Browser (Headless Chromium via CDP)
  # ==========================================================================
  # VAF's browser_agent tool connects here via ws://localhost:9222.
  # No Chromium installation needed on the host.
  # CDP port is bound to 127.0.0.1 only — not accessible from outside the machine.
  vaf-browser:
    build:
      context: ./docker/browser
      dockerfile: Dockerfile
    container_name: vaf-browser
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BROWSER_CDP_PORT:-9222}:9222"
    networks:
      - vaf-browser-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9222/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  # DB volume – holds Memory + Auth/User data; do not remove or replace
  vaf_pgdata:
    name: vaf_memory_pgdata
    driver: local
  vaf_redis:
    name: vaf_redis_data
    driver: local
  vaf_sandbox:
    name: vaf_sandbox_workspace
    driver: local
  vaf_tts_models:
    name: vaf_tts_models
    driver: local
  vaf_tts_config:
    name: vaf_tts_config
    driver: local
  vaf_stt_models:
    name: vaf_stt_models
    driver: local

networks:
  vaf-network:
    name: vaf-network
    driver: bridge
  # Isolated network for the Python sandbox.
  # The sandbox is NOT on vaf-network, so it cannot reach postgres/redis by hostname.
  vaf-sandbox-network:
    name: vaf-sandbox-network
    driver: bridge
  # Isolated network for the browser container.
  # The browser is NOT on vaf-network, so it cannot reach postgres/redis by hostname.
  # A compromised browser (SSRF/XSS) has no path to the database.
  vaf-browser-network:
    name: vaf-browser-network
    driver: bridge
