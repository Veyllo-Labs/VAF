name: VAF CI (full matrix)

# Exhaustive cross-platform run: every OS x every supported Python version.
# Runs once a day and on demand (the "Run workflow" button) rather than on every
# push, so version-/OS-specific regressions are still caught without slowing down
# per-commit feedback or burning Actions minutes on every commit.

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch: {}    # manual trigger from the Actions tab

jobs:
  test:
    uses: ./.github/workflows/_test.yml
    with:
      matrix: '{"include":[{"os":"ubuntu-latest","python-version":"3.10"},{"os":"ubuntu-latest","python-version":"3.11"},{"os":"ubuntu-latest","python-version":"3.12"},{"os":"ubuntu-latest","python-version":"3.13"},{"os":"macos-latest","python-version":"3.10"},{"os":"macos-latest","python-version":"3.11"},{"os":"macos-latest","python-version":"3.12"},{"os":"macos-latest","python-version":"3.13"},{"os":"windows-latest","python-version":"3.10"},{"os":"windows-latest","python-version":"3.11"},{"os":"windows-latest","python-version":"3.12"},{"os":"windows-latest","python-version":"3.13"}]}'
