# Dependabot configuration for VAF (Veyllo Agentic Framework)
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Python dependencies (requirements.txt / setup.py at the repo root)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Web UI (Node.js dependencies)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # WhatsApp bridge node service (Node.js dependencies)
  - package-ecosystem: "npm"
    directory: "/vaf/whatsapp_node"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
