name: VAF CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          # tflite-runtime (openwakeword dependency) has no PyPI wheels for Py3.11+ on Linux yet
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev python3-dev

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install portaudio

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        # Install VAF in editable mode (checks requirements.txt and setup.py)
        pip install -e .

    - name: Lint with Ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check . --select=E9,F63,F7,F82 --show-source
        # Exit-zero treats all other errors as warnings
        ruff check . --exit-zero

    - name: Verify CLI Entry Point (Smoke Test)
      run: |
        # This checks if all imports work and requirements are met
        vaf --version
        vaf --help

    - name: Run Tool Logic Tests
      # We skip full agent tests because we can't load a 4GB model in CI
      # But we can test the tool logic, templates, and scaffolding
      run: |
        # Create a dummy test if none exist yet to prevent CI failure
        # (See next step logic in agent thought process)
        pytest tests/ --ignore=tests/test_gpu_inference.py
