# Dependabot configuration for VAF (Veyllo Agentic Framework)
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Strategy: minor + patch updates are bundled into a single grouped PR per
# ecosystem (so a routine week is one PR to review, not a dozen). Major updates
# deliberately stay OUTSIDE the group and get their own PR, because a major bump
# can be breaking and deserves an individual look. Commit messages follow the
# Conventional Commits convention used across the repo (see CONTRIBUTING.md).
version: 2
updates:
  # Python dependencies (requirements.txt / setup.py at the repo root)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Web UI (Node.js dependencies)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      web-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # WhatsApp bridge node service (Node.js dependencies)
  - package-ecosystem: "npm"
    directory: "/vaf/whatsapp_node"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      whatsapp-node-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
