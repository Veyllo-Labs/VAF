name: VAF Release

# Cutting a release: push a tag `v<version>` (see docs/setup/RELEASING.md).
# This re-runs the test gate on the tagged commit and, on success, creates the
# GitHub Release that `vaf update` targets AND publishes the sdist+wheel to
# PyPI (Trusted Publishing / OIDC, environment `pypi`). Every release is a
# two-channel event: git checkouts update via `vaf update`, pip installs via
# `pip install -U --pre vaf`. Dry-run against TestPyPI first via the manual
# publish-testpypi.yml workflow.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  gate-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt
          pip install -e .

      - name: Lint (syntax/undefined names only)
        run: ruff check . --select=E9,F63,F7,F82 --exclude vaf/tools/coder_templates

      - name: Verify CLI entry point
        run: |
          vaf --version
          vaf --help

      - name: Run tests
        run: pytest tests/

      - name: Verify tag matches vaf/version.py
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CODE_VERSION="$(python -c 'import vaf; print(vaf.__version__)')"
          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match vaf/version.py ($CODE_VERSION)"; exit 1
          fi

      - name: Verify web/package.json matches vaf/version.py
        run: |
          python - <<'PY'
          import json, sys
          from packaging.version import parse
          import vaf
          pkg = json.load(open("web/package.json")).get("version", "")
          if not pkg or parse(pkg) != parse(vaf.__version__):
              print(f"web/package.json version '{pkg}' does not match vaf/version.py '{vaf.__version__}'.")
              print("Bump web/package.json to the npm spelling of the SSOT (e.g. 0.1.0a0 -> 0.1.0-alpha.0).")
              sys.exit(1)
          print(f"web/package.json '{pkg}' matches vaf/version.py '{vaf.__version__}'.")
          PY

      - name: Extract release notes + detect prerelease
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "See CHANGELOG.md for details." > release_notes.md
          fi
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VAF ${{ github.ref_name }}
          body_path: release_notes.md
          prerelease: ${{ steps.notes.outputs.prerelease }}

  # Publishes to PyPI via Trusted Publishing (OIDC): no long-lived token
  # anywhere. PyPI-side counterpart: the trusted publisher registered for
  # project `vaf` (owner Veyllo-Labs, repo VAF, workflow release.yml,
  # environment pypi). The `pypi` environment must exist in the repo settings.
  # PyPI versions are immutable: a bad upload cannot be replaced under the
  # same version, hence the TestPyPI dry-run workflow.
  publish-pypi:
    needs: gate-and-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
