name: VAF CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    # Lean per-commit matrix for fast feedback: the full Python matrix on Linux
    # (1x minutes) plus a single-version smoke on macOS and Windows. The exhaustive
    # 3-OS x 4-Python matrix runs nightly and on demand via ci-nightly.yml.
    uses: ./.github/workflows/_test.yml
    with:
      matrix: '{"include":[{"os":"ubuntu-latest","python-version":"3.10"},{"os":"ubuntu-latest","python-version":"3.11"},{"os":"ubuntu-latest","python-version":"3.12"},{"os":"ubuntu-latest","python-version":"3.13"},{"os":"macos-latest","python-version":"3.12"},{"os":"windows-latest","python-version":"3.12"}]}'
